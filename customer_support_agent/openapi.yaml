openapi: 3.0.3
info:
  title: Customer Support Agent Service
  description: |
    A FastAPI service that provides a customer support agent powered by LangGraph.
    The agent can help with flight status, bookings, and other travel-related inquiries.
  version: 1.0.0
  contact:
    name: API Support
servers:
  - url: http://localhost:8000
    description: Local development server
  - url: http://127.0.0.1:8000
    description: Local development server (alternative)
paths:
  /chat:
    post:
      summary: Chat with the customer support agent
      description: |
        Sends a message to the customer support agent and receives a response.
        The agent maintains conversation state using the session_id and can use context for additional information.
      operationId: chat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
            examples:
              basicChat:
                summary: Basic chat request
                value:
                  message: "What is my flight status?"
                  session_id: "abc123"
                  context: {"flight": "UA1234"}
      responses:
        '200':
          description: Successful response from the agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
              examples:
                chatResponse:
                  summary: Chat response
                  value:
                    response: "Your flight UA1234 is scheduled to depart at 3:30 PM and is currently on time."
        '400':
          description: Bad request - missing required fields
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "Missing required field: message"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  detail:
                    type: string
                    example: "An error occurred while processing your request"
components:
  schemas:
    ChatRequest:
      type: object
      required:
        - message
        - session_id
      properties:
        message:
          type: string
          description: The user's message or question for the agent
        session_id:
          type: string
          description: Unique identifier for the conversation session
        context:
          type: object
          description: Optional context information for the agent
          nullable: true
    ChatResponse:
      type: object
      properties:
        response:
          type: string
          description: The agent's response to the user's message
